<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS NOTE - Cuaderno Digital Futurista</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a0f 0%, #030305 100%);
            min-height: 100vh;
            padding: 2rem;
            color: #e8e8ff;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00ffff 0%, #ff00ff 50%, #00ffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 3s linear infinite;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .header p {
            color: #8b8bff;
            margin-top: 0.5rem;
            letter-spacing: 1px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* Autenticación mejorada */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }

        .auth-card {
            background: rgba(10, 10, 20, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2.5rem;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 450px;
        }

        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding-bottom: 1rem;
        }

        .auth-tab {
            flex: 1;
            background: none;
            border: none;
            padding: 0.75rem;
            font-size: 1rem;
            cursor: pointer;
            color: #8b8bff;
            transition: all 0.3s;
            border-radius: 0.5rem;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, #00ffff20 0%, #ff00ff20 100%);
            color: #00ffff;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .auth-form.hidden {
            display: none;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            color: #00ffff;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 0.875rem 1rem;
            border-radius: 1rem;
            color: #e8e8ff;
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .auth-button {
            background: linear-gradient(135deg, #00ffff20 0%, #ff00ff20 100%);
            border: 1px solid rgba(0, 255, 255, 0.5);
            padding: 0.875rem;
            border-radius: 1rem;
            cursor: pointer;
            color: #00ffff;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .auth-button:hover {
            background: linear-gradient(135deg, #00ffff40 0%, #ff00ff40 100%);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            transform: scale(1.02);
        }

        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 0.75rem;
            text-align: center;
            font-size: 0.85rem;
        }

        .message.error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff6666;
        }

        .message.success {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid rgba(0, 255, 0, 0.3);
            color: #66ff66;
        }

        /* User info bar */
        .user-bar {
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .user-email {
            color: #00ffff;
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255, 0, 255, 0.2);
            border: 1px solid rgba(255, 0, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            color: #ff00ff;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 0, 255, 0.4);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }

        /* Resto de estilos (igual que antes) */
        .day-navigator {
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 1.25rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .day-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .nav-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .nav-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            width: 44px;
            height: 44px;
            border-radius: 1rem;
            cursor: pointer;
            font-size: 1.25rem;
            transition: all 0.3s;
            color: #00ffff;
        }

        .nav-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .date-display {
            flex: 1;
            text-align: center;
        }

        .date-card {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2) 0%, rgba(255, 0, 255, 0.2) 100%);
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            display: inline-block;
            color: #00ffff;
            font-weight: 600;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .go-today {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            cursor: pointer;
            color: #00ffff;
        }

        .go-today:hover {
            background: rgba(0, 255, 255, 0.2);
        }

        .month-selector {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .month-btn {
            background: rgba(10, 10, 20, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            color: #8b8bff;
            transition: all 0.3s;
        }

        .month-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
        }

        .month-btn.active {
            background: linear-gradient(135deg, #00ffff20 0%, #ff00ff20 100%);
            border-color: #00ffff;
            color: #00ffff;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .day-card {
            background: rgba(10, 10, 20, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.3s;
            cursor: pointer;
        }

        .day-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 255, 255, 0.2);
        }

        .day-card-header {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1) 0%, rgba(255, 0, 255, 0.1) 100%);
            padding: 1rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            font-weight: 600;
            color: #00ffff;
        }

        .day-card-preview {
            padding: 1rem;
            min-height: 120px;
            color: #c0c0ff;
            font-size: 0.9rem;
        }

        .empty-preview {
            color: rgba(0, 255, 255, 0.3);
            font-style: italic;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(5, 5, 10, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            background: linear-gradient(135deg, #00ffff 0%, #ff00ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .close-modal {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            width: 36px;
            height: 36px;
            border-radius: 1rem;
            cursor: pointer;
            color: #00ffff;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .note-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            color: #00ffff;
            margin-bottom: 0.75rem;
        }

        textarea, input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 1rem;
            font-family: inherit;
            font-size: 0.95rem;
            color: #e8e8ff;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .todo-list {
            margin-top: 0.5rem;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(0, 255, 255, 0.05);
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .todo-item input[type="checkbox"] {
            width: auto;
            transform: scale(1.2);
            accent-color: #00ffff;
        }

        .todo-item.completed span {
            text-decoration: line-through;
            color: rgba(0, 255, 255, 0.4);
        }

        .add-todo {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ffff20 0%, #ff00ff20 100%);
            color: #00ffff;
            border: 1px solid rgba(0, 255, 255, 0.5);
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #00ffff40 0%, #ff00ff40 100%);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            cursor: pointer;
            color: #8b8bff;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
        }

        .stats {
            background: rgba(10, 10, 20, 0.6);
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            margin-top: 2rem;
            text-align: center;
            color: #8b8bff;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .days-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ NEXUS NOTE ⚡</h1>
            <p>CUADERNO DIGITAL · AGENDA FUTURISTA · SISTEMA NEXUS</p>
        </div>

        <!-- Pantalla de Autenticación -->
        <div id="authScreen" class="auth-container">
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" id="loginTab">🔐 INICIAR SESIÓN</button>
                    <button class="auth-tab" id="registerTab">✨ REGISTRARSE</button>
                </div>

                <!-- Formulario de Login -->
                <div id="loginForm" class="auth-form">
                    <div class="input-group">
                        <label>📧 EMAIL</label>
                        <input type="email" id="loginEmail" placeholder="tu@email.com">
                    </div>
                    <div class="input-group">
                        <label>🔒 CONTRASEÑA</label>
                        <input type="password" id="loginPassword" placeholder="••••••••">
                    </div>
                    <button class="auth-button" id="doLoginBtn">INICIAR SESIÓN</button>
                </div>

                <!-- Formulario de Registro -->
                <div id="registerForm" class="auth-form hidden">
                    <div class="input-group">
                        <label>📧 EMAIL</label>
                        <input type="email" id="registerEmail" placeholder="tu@email.com">
                    </div>
                    <div class="input-group">
                        <label>🔒 CONTRASEÑA</label>
                        <input type="password" id="registerPassword" placeholder="mínimo 6 caracteres">
                    </div>
                    <button class="auth-button" id="doRegisterBtn">CREAR CUENTA</button>
                </div>

                <div id="authMessage" class="message" style="display: none;"></div>
            </div>
        </div>

        <!-- Pantalla Principal (después de login) -->
        <div id="mainScreen" class="hidden">
            <div class="user-bar">
                <span class="user-email" id="userEmailDisplay"></span>
                <button class="logout-btn" id="logoutBtn">🔒 CERRAR SESIÓN</button>
            </div>

            <div class="day-navigator">
                <div class="day-controls">
                    <div class="nav-buttons">
                        <button class="nav-btn" id="prevMonth">←</button>
                        <button class="nav-btn" id="nextMonth">→</button>
                    </div>
                    <div class="date-display">
                        <div class="date-card" id="currentMonthYear">Enero 2024</div>
                    </div>
                    <button class="go-today" id="goToday">📅 HOY</button>
                </div>
                <div class="month-selector" id="monthSelector"></div>
            </div>

            <div id="daysGrid" class="days-grid"></div>
            <div class="stats" id="stats">🌀 INICIALIZANDO SISTEMA NEXUS...</div>
        </div>
    </div>

    <!-- Modal Editor -->
    <div id="dayModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalDateTitle">Día</h2>
                <button class="close-modal" id="closeModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="note-section">
                    <div class="section-title">📝 NOTAS NEXUS</div>
                    <textarea id="notesContent" rows="4" placeholder="Escribe tus notas aquí..."></textarea>
                </div>
                <div class="note-section">
                    <div class="section-title">✅ LISTA DE TAREAS</div>
                    <div id="todoListContainer" class="todo-list"></div>
                    <div class="add-todo">
                        <input type="text" id="newTodoInput" placeholder="Nueva tarea...">
                        <button class="btn-primary" id="addTodoBtn">+ AÑADIR</button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn-secondary" id="cancelModal">CANCELAR</button>
                    <button class="btn-primary" id="saveDayBtn">GUARDAR</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://kayboraysiwqqzujcadh.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_QDTcuZmeQ2-ns8uHkTPjw_CM8PC_';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Variables
        let currentUser = null;
        let notebookData = {};
        let currentDate = new Date();
        let currentEditingDate = null;

        // Elementos DOM
        const authScreen = document.getElementById('authScreen');
        const mainScreen = document.getElementById('mainScreen');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const authMessage = document.getElementById('authMessage');

        // Mostrar mensaje
        function showMessage(text, type) {
            authMessage.textContent = text;
            authMessage.className = `message ${type}`;
            authMessage.style.display = 'block';
            setTimeout(() => {
                authMessage.style.display = 'none';
            }, 3000);
        }

        // Cambiar entre login y registro
        document.getElementById('loginTab').addEventListener('click', () => {
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('registerTab').classList.remove('active');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            authMessage.style.display = 'none';
        });

        document.getElementById('registerTab').addEventListener('click', () => {
            document.getElementById('registerTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            authMessage.style.display = 'none';
        });

        // Login
        async function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('⚠️ Completa todos los campos', 'error');
                return;
            }

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                showMessage('❌ Error: ' + error.message, 'error');
            } else {
                showMessage('✅ ¡Bienvenido/a ' + email + '!', 'success');
                currentUser = data.user;
                showMainScreen();
                await loadAllUserData();
            }
        }

        // Registro
        async function doRegister() {
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;

            if (!email || !password) {
                showMessage('⚠️ Completa todos los campos', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('⚠️ La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }

            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password
            });

            if (error) {
                showMessage('❌ Error: ' + error.message, 'error');
            } else {
                showMessage('✅ ¡Registro exitoso! Ahora inicia sesión.', 'success');
                // Cambiar a login
                document.getElementById('loginTab').click();
                document.getElementById('loginEmail').value = email;
                document.getElementById('loginPassword').value = '';
            }
        }

        // Logout
        async function doLogout() {
            await supabase.auth.signOut();
            currentUser = null;
            showAuthScreen();
        }

        // Mostrar pantalla principal
        function showMainScreen() {
            authScreen.classList.add('hidden');
            mainScreen.classList.remove('hidden');
            document.getElementById('userEmailDisplay').textContent = currentUser?.email || '';
        }

        // Mostrar pantalla de autenticación
        function showAuthScreen() {
            authScreen.classList.remove('hidden');
            mainScreen.classList.add('hidden');
            // Limpiar formularios
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('registerEmail').value = '';
            document.getElementById('registerPassword').value = '';
        }

        // Cargar datos del usuario
        async function loadAllUserData() {
            if (!currentUser) return;

            const { data, error } = await supabase
                .from('notebook_entries')
                .select('*')
                .eq('user_id', currentUser.id);

            if (error) {
                console.error('Error:', error);
                return;
            }

            notebookData = {};
            if (data) {
                data.forEach(entry => {
                    notebookData[entry.date] = {
                        notes: entry.notes || '',
                        todos: entry.todos || [],
                        id: entry.id
                    };
                });
            }

            renderCurrentView();
            updateStats();
        }

        // Guardar datos
        async function saveDayData(dateStr, notes, todos) {
            if (!currentUser) return;

            const existingEntry = notebookData[dateStr];
            const todoData = todos.map(t => ({ id: t.id, text: t.text, completed: t.completed }));

            if (existingEntry && existingEntry.id) {
                const { error } = await supabase
                    .from('notebook_entries')
                    .update({ notes: notes, todos: todoData })
                    .eq('id', existingEntry.id);

                if (error) {
                    showMessage('❌ Error al guardar', 'error');
                    return false;
                }
            } else {
                const { error } = await supabase
                    .from('notebook_entries')
                    .insert({ user_id: currentUser.id, date: dateStr, notes: notes, todos: todoData });

                if (error) {
                    showMessage('❌ Error al guardar', 'error');
                    return false;
                }
            }

            notebookData[dateStr] = { notes: notes, todos: todos, id: existingEntry?.id };
            return true;
        }

        // Obtener datos de un día
        function getDayData(dateStr) {
            return notebookData[dateStr] || { notes: "", todos: [] };
        }

        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        function getDayName(date) {
            const days = ['DOMINGO', 'LUNES', 'MARTES', 'MIÉRCOLES', 'JUEVES', 'VIERNES', 'SÁBADO'];
            return days[date.getDay()];
        }

        async function renderCurrentView() {
            if (!currentUser) return;

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const startWeekday = firstDay.getDay();

            const days = [];
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            for (let i = startWeekday - 1; i >= 0; i--) {
                days.push({ date: new Date(year, month - 1, prevMonthLastDay - i), isCurrentMonth: false });
            }
            for (let i = 1; i <= daysInMonth; i++) {
                days.push({ date: new Date(year, month, i), isCurrentMonth: true });
            }
            const remaining = 42 - days.length;
            for (let i = 1; i <= remaining; i++) {
                days.push({ date: new Date(year, month + 1, i), isCurrentMonth: false });
            }

            const monthNames = ['ENERO', 'FEBRERO', 'MARZO', 'ABRIL', 'MAYO', 'JUNIO', 'JULIO', 'AGOSTO', 'SEPTIEMBRE', 'OCTUBRE', 'NOVIEMBRE', 'DICIEMBRE'];
            document.getElementById('currentMonthYear').textContent = `${monthNames[month]} ${year}`;

            const grid = document.getElementById('daysGrid');
            grid.innerHTML = days.map(day => {
                const dateStr = formatDate(day.date);
                const dayData = notebookData[dateStr] || { notes: "", todos: [] };
                const preview = dayData.notes ? dayData.notes.substring(0, 80) : (dayData.todos.length > 0 ? `📋 ${dayData.todos.length} tareas` : "⚡ SIN DATOS");
                const hasContent = dayData.notes || dayData.todos.length > 0;
                return `
                    <div class="day-card" data-date="${dateStr}">
                        <div class="day-card-header">${getDayName(day.date)} · ${day.date.getDate()}</div>
                        <div class="day-card-preview">${hasContent ? preview : '<span class="empty-preview">🌀 NEXUS VACÍO · ACTIVAR</span>'}</div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.day-card').forEach(card => {
                card.addEventListener('click', () => openModal(card.dataset.date));
            });

            // Actualizar selector de meses
            const months = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];
            document.getElementById('monthSelector').innerHTML = months.map((m, idx) => 
                `<button class="month-btn ${idx === month ? 'active' : ''}" data-month="${idx}">${m}</button>`
            ).join('');
            document.querySelectorAll('.month-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentDate.setMonth(parseInt(e.target.dataset.month));
                    renderCurrentView();
                });
            });
        }

        async function openModal(dateStr) {
            currentEditingDate = dateStr;
            const date = new Date(dateStr);
            const dayData = getDayData(dateStr);
            document.getElementById('modalDateTitle').textContent = `${getDayName(date)} ${date.getDate()} · ${date.toLocaleString('es', { month: 'long' }).toUpperCase()} ${date.getFullYear()}`;
            document.getElementById('notesContent').value = dayData.notes || '';
            renderTodoList(dayData.todos || []);
            document.getElementById('dayModal').classList.add('active');
        }

        function renderTodoList(todos) {
            const container = document.getElementById('todoListContainer');
            if (!todos.length) {
                container.innerHTML = '<p style="color:rgba(0,255,255,0.4); text-align:center;">⚡ SIN TAREAS</p>';
                return;
            }
            container.innerHTML = todos.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                    <input type="checkbox" ${todo.completed ? 'checked' : ''} class="todo-checkbox">
                    <span>${escapeHtml(todo.text)}</span>
                    <button class="delete-todo" style="background:none; border:none; cursor:pointer; color:#ff00ff;">🗑️</button>
                </div>
            `).join('');

            document.querySelectorAll('.todo-checkbox').forEach((cb, i) => {
                cb.addEventListener('change', async () => {
                    const dayData = getDayData(currentEditingDate);
                    dayData.todos[i].completed = cb.checked;
                    await saveDayData(currentEditingDate, dayData.notes, dayData.todos);
                    renderTodoList(dayData.todos);
                });
            });
            document.querySelectorAll('.delete-todo').forEach((btn, i) => {
                btn.addEventListener('click', async () => {
                    const dayData = getDayData(currentEditingDate);
                    dayData.todos.splice(i, 1);
                    await saveDayData(currentEditingDate, dayData.notes, dayData.todos);
                    renderTodoList(dayData.todos);
                });
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function saveCurrentDay() {
            if (!currentEditingDate) return;
            const notes = document.getElementById('notesContent').value;
            const dayData = getDayData(currentEditingDate);
            await saveDayData(currentEditingDate, notes, dayData.todos || []);
            closeModal();
            renderCurrentView();
            updateStats();
        }

        function closeModal() {
            document.getElementById('dayModal').classList.remove('active');
            currentEditingDate = null;
        }

        async function updateStats() {
            const totalDays = Object.keys(notebookData).length;
            let totalNotes = 0, totalTodos = 0;
            Object.values(notebookData).forEach(day => {
                if (day.notes?.trim()) totalNotes++;
                if (day.todos) totalTodos += day.todos.length;
            });
            document.getElementById('stats').innerHTML = `🌀 NEXUS STATS · ${totalDays} DÍAS · ${totalNotes} NOTAS · ${totalTodos} TAREAS<br>💾 DATOS SINCRONIZADOS · SUPABASE CLOUD`;
        }

        // Event listeners
        document.getElementById('doLoginBtn').addEventListener('click', doLogin);
        document.getElementById('doRegisterBtn').addEventListener('click', doRegister);
        document.getElementById('logoutBtn').addEventListener('click', doLogout);
        document.getElementById('prevMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCurrentView(); });
        document.getElementById('nextMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCurrentView(); });
        document.getElementById('goToday').addEventListener('click', () => { currentDate = new Date(); renderCurrentView(); });
        document.getElementById('saveDayBtn').addEventListener('click', saveCurrentDay);
        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('cancelModal').addEventListener('click', closeModal);
        document.getElementById('addTodoBtn').addEventListener('click', async () => {
            const input = document.getElementById('newTodoInput');
            const text = input.value.trim();
            if (text && currentEditingDate) {
                const dayData = getDayData(currentEditingDate);
                dayData.todos.push({ id: Date.now(), text: text, completed: false });
                await saveDayData(currentEditingDate, dayData.notes, dayData.todos);
                renderTodoList(dayData.todos);
                input.value = '';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Verificar sesión al cargar
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                showMainScreen();
                await loadAllUserData();
            } else {
                showAuthScreen();
            }
        }

        checkSession();
    </script>
</body>
</html>
