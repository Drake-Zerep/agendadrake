<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cuaderno Digital - Agenda Elegante</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            padding: 2rem;
            color: #1a2a3a;
        }

        /* Contenedor principal */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header elegante */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #5a6e7c;
            margin-top: 0.5rem;
            font-weight: 400;
        }

        /* Navegador de días */
        .day-navigator {
            background: white;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
        }

        .day-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .nav-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .nav-btn {
            background: #f0f2f5;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 1rem;
            cursor: pointer;
            font-size: 1.25rem;
            transition: all 0.2s ease;
            color: #2c3e50;
        }

        .nav-btn:hover {
            background: #e0e4e9;
            transform: scale(1.05);
        }

        .date-display {
            flex: 1;
            text-align: center;
        }

        .date-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            display: inline-block;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .go-today {
            background: white;
            border: 1px solid #e0e4e9;
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            color: #4a5568;
        }

        .go-today:hover {
            background: #f7f9fc;
            border-color: #cbd5e0;
        }

        /* Selector de mes */
        .month-selector {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .month-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.9rem;
            color: #5a6e7c;
            transition: all 0.2s;
        }

        .month-btn:hover {
            background: #e9ecef;
        }

        .month-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Grid de días */
        .days-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        /* Tarjeta de día */
        .day-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .day-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
        }

        .day-card-header {
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            padding: 1rem;
            border-bottom: 2px solid #f0f2f5;
            font-weight: 600;
            font-size: 1.1rem;
            color: #2c3e50;
        }

        .day-card-preview {
            padding: 1rem;
            min-height: 120px;
            color: #4a5568;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .empty-preview {
            color: #cbd5e0;
            font-style: italic;
        }

        /* Modal principal (editor de día) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 2rem;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            border-radius: 2rem 2rem 0 0;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e3c72;
        }

        .close-modal {
            background: #f0f2f5;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 1rem;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .modal-body {
            padding: 1.5rem;
        }

        /* Áreas de notas estilo cuaderno */
        .note-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 0.75rem;
        }

        textarea, input {
            width: 100%;
            padding: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
            resize: vertical;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .todo-list {
            margin-top: 0.5rem;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: #f8fafc;
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .todo-item input[type="checkbox"] {
            width: auto;
            margin: 0;
            transform: scale(1.2);
        }

        .todo-item span {
            flex: 1;
            font-size: 0.95rem;
        }

        .todo-item.completed span {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .add-todo {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .add-todo input {
            flex: 1;
            padding: 0.75rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-secondary {
            background: #f0f2f5;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            cursor: pointer;
            font-weight: 500;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #e9ecef;
        }

        /* Estadísticas */
        .stats {
            background: white;
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            margin-top: 2rem;
            text-align: center;
            color: #5a6e7c;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .day-controls {
                flex-direction: column;
            }
            
            .days-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📔 Cuaderno Digital</h1>
            <p>Tu agenda personal · Notas · Ideas · Tareas</p>
        </div>

        <div class="day-navigator">
            <div class="day-controls">
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevMonth">←</button>
                    <button class="nav-btn" id="nextMonth">→</button>
                </div>
                <div class="date-display">
                    <div class="date-card" id="currentMonthYear">Enero 2024</div>
                </div>
                <button class="go-today" id="goToday">📅 Hoy</button>
            </div>
            <div class="month-selector" id="monthSelector"></div>
        </div>

        <div id="daysGrid" class="days-grid"></div>

        <div class="stats" id="stats">
            Cargando estadísticas...
        </div>
    </div>

    <!-- Modal Editor -->
    <div id="dayModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalDateTitle">Día</h2>
                <button class="close-modal" id="closeModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="note-section">
                    <div class="section-title">📝 NOTAS RÁPIDAS</div>
                    <textarea id="notesContent" rows="4" placeholder="Escribe tus notas, ideas, reflexiones..."></textarea>
                </div>

                <div class="note-section">
                    <div class="section-title">✅ LISTA DE TAREAS</div>
                    <div id="todoListContainer" class="todo-list"></div>
                    <div class="add-todo">
                        <input type="text" id="newTodoInput" placeholder="Nueva tarea...">
                        <button class="btn-primary" id="addTodoBtn">+ Añadir</button>
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="btn-secondary" id="cancelModal">Cancelar</button>
                    <button class="btn-primary" id="saveDayBtn">Guardar Día</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Almacenamiento de datos
        let notebookData = {};
        let currentDate = new Date();
        let currentEditingDate = null;

        // Cargar datos guardados
        function loadData() {
            const saved = localStorage.getItem('elegantNotebook');
            if (saved) {
                notebookData = JSON.parse(saved);
            } else {
                // Datos de ejemplo
                const today = new Date().toISOString().split('T')[0];
                notebookData[today] = {
                    notes: "¡Bienvenido a tu cuaderno digital! ✨\n\nEste es tu espacio personal para capturar ideas, notas y tareas. Cada día es una nueva hoja en tu agenda.",
                    todos: [
                        { id: Date.now(), text: "Explorar el cuaderno", completed: false },
                        { id: Date.now() + 1, text: "Agregar notas importantes", completed: false }
                    ]
                };
            }
        }

        // Guardar datos
        function saveData() {
            localStorage.setItem('elegantNotebook', JSON.stringify(notebookData));
            renderCurrentView();
            updateStats();
        }

        // Obtener datos de un día específico
        function getDayData(dateStr) {
            if (!notebookData[dateStr]) {
                notebookData[dateStr] = {
                    notes: "",
                    todos: []
                };
            }
            return notebookData[dateStr];
        }

        // Formatear fecha
        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        // Obtener nombre del día
        function getDayName(date) {
            const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            return days[date.getDay()];
        }

        // Renderizar vista de días del mes
        function renderCurrentView() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            
            const daysInMonth = lastDay.getDate();
            const startWeekday = firstDay.getDay();
            
            const days = [];
            
            // Días del mes anterior para completar grid
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            for (let i = startWeekday - 1; i >= 0; i--) {
                const dayNum = prevMonthLastDay - i;
                const date = new Date(year, month - 1, dayNum);
                days.push({ date, isCurrentMonth: false });
            }
            
            // Días del mes actual
            for (let i = 1; i <= daysInMonth; i++) {
                const date = new Date(year, month, i);
                days.push({ date, isCurrentMonth: true });
            }
            
            // Días del mes siguiente
            const remaining = 42 - days.length;
            for (let i = 1; i <= remaining; i++) {
                const date = new Date(year, month + 1, i);
                days.push({ date, isCurrentMonth: false });
            }
            
            const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            document.getElementById('currentMonthYear').textContent = `${monthNames[month]} ${year}`;
            
            const grid = document.getElementById('daysGrid');
            grid.innerHTML = days.map(day => {
                const dateStr = formatDate(day.date);
                const dayData = notebookData[dateStr] || { notes: "", todos: [] };
                const preview = dayData.notes ? dayData.notes.substring(0, 80) : (dayData.todos.length > 0 ? `📋 ${dayData.todos.length} tareas` : "Sin notas");
                const hasContent = dayData.notes || dayData.todos.length > 0;
                
                return `
                    <div class="day-card" data-date="${dateStr}">
                        <div class="day-card-header">
                            ${getDayName(day.date)} ${day.date.getDate()}
                            ${!day.isCurrentMonth ? '<span style="opacity:0.5; font-size:0.8rem;"> · otro mes</span>' : ''}
                        </div>
                        <div class="day-card-preview">
                            ${hasContent ? preview : '<span class="empty-preview">✨ Vacío · Toca para escribir</span>'}
                        </div>
                    </div>
                `;
            }).join('');
            
            // Agregar event listeners a las tarjetas
            document.querySelectorAll('.day-card').forEach(card => {
                card.addEventListener('click', () => {
                    const date = card.dataset.date;
                    openModal(date);
                });
            });
            
            updateMonthSelector();
        }
        
        function updateMonthSelector() {
            const container = document.getElementById('monthSelector');
            const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
            const currentMonth = currentDate.getMonth();
            const currentYear = currentDate.getFullYear();
            
            container.innerHTML = months.map((month, idx) => {
                const isActive = idx === currentMonth;
                return `<button class="month-btn ${isActive ? 'active' : ''}" data-month="${idx}">${month}</button>`;
            }).join('');
            
            document.querySelectorAll('.month-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const month = parseInt(e.target.dataset.month);
                    currentDate.setMonth(month);
                    renderCurrentView();
                });
            });
        }
        
        function openModal(dateStr) {
            currentEditingDate = dateStr;
            const date = new Date(dateStr);
            const dayData = getDayData(dateStr);
            
            document.getElementById('modalDateTitle').textContent = `${getDayName(date)} ${date.getDate()} de ${date.toLocaleString('es', { month: 'long' })} ${date.getFullYear()}`;
            document.getElementById('notesContent').value = dayData.notes || '';
            
            renderTodoList(dayData.todos);
            
            document.getElementById('dayModal').classList.add('active');
        }
        
        function renderTodoList(todos) {
            const container = document.getElementById('todoListContainer');
            if (!todos || todos.length === 0) {
                container.innerHTML = '<p style="color:#cbd5e0; text-align:center; padding:1rem;">No hay tareas · Añade tu primera tarea ✨</p>';
                return;
            }
            
            container.innerHTML = todos.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                    <input type="checkbox" ${todo.completed ? 'checked' : ''} class="todo-checkbox">
                    <span>${escapeHtml(todo.text)}</span>
                    <button class="delete-todo" style="background:none; border:none; cursor:pointer; color:#e53e3e;">🗑️</button>
                </div>
            `).join('');
            
            // Event listeners para checkboxes y delete
            document.querySelectorAll('.todo-checkbox').forEach((checkbox, idx) => {
                checkbox.addEventListener('change', (e) => {
                    const todoId = todos[idx].id;
                    const dayData = notebookData[currentEditingDate];
                    const todo = dayData.todos.find(t => t.id === todoId);
                    if (todo) todo.completed = checkbox.checked;
                    saveData();
                    renderTodoList(dayData.todos);
                });
            });
            
            document.querySelectorAll('.delete-todo').forEach((btn, idx) => {
                btn.addEventListener('click', () => {
                    const todoId = todos[idx].id;
                    const dayData = notebookData[currentEditingDate];
                    dayData.todos = dayData.todos.filter(t => t.id !== todoId);
                    saveData();
                    renderTodoList(dayData.todos);
                });
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function saveCurrentDay() {
            if (!currentEditingDate) return;
            
            const notes = document.getElementById('notesContent').value;
            const dayData = notebookData[currentEditingDate];
            dayData.notes = notes;
            
            saveData();
            closeModal();
        }
        
        function closeModal() {
            document.getElementById('dayModal').classList.remove('active');
            currentEditingDate = null;
        }
        
        function updateStats() {
            const totalDays = Object.keys(notebookData).length;
            let totalNotes = 0;
            let totalTodos = 0;
            
            Object.values(notebookData).forEach(day => {
                if (day.notes && day.notes.trim()) totalNotes++;
                if (day.todos) totalTodos += day.todos.length;
            });
            
            document.getElementById('stats').innerHTML = `
                📊 Estadísticas · ${totalDays} días con entradas · ${totalNotes} días con notas · ${totalTodos} tareas registradas
                <br>💾 Todos los datos se guardan automáticamente en tu navegador
            `;
        }
        
        // Navegación
        document.getElementById('prevMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCurrentView();
        });
        
        document.getElementById('nextMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCurrentView();
        });
        
        document.getElementById('goToday').addEventListener('click', () => {
            currentDate = new Date();
            renderCurrentView();
        });
        
        document.getElementById('saveDayBtn').addEventListener('click', saveCurrentDay);
        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('cancelModal').addEventListener('click', closeModal);
        
        document.getElementById('addTodoBtn').addEventListener('click', () => {
            const input = document.getElementById('newTodoInput');
            const text = input.value.trim();
            if (text && currentEditingDate) {
                const dayData = notebookData[currentEditingDate];
                if (!dayData.todos) dayData.todos = [];
                dayData.todos.push({
                    id: Date.now(),
                    text: text,
                    completed: false
                });
                saveData();
                renderTodoList(dayData.todos);
                input.value = '';
            }
        });
        
        // Cerrar modal con ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('dayModal').classList.contains('active')) {
                closeModal();
            }
        });
        
        // Inicializar
        loadData();
        renderCurrentView();
        updateStats();
    </script>
</body>
</html>
